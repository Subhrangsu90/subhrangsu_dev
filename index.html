<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #dd0031;
    --dark: #0a0a0f;
    --card: #0f0f16;
    --border: #1a1a26;
    --text: #e8e6f0;
    --muted: #55536a;
    --dim: #2a2838;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(221,0,49,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(221,0,49,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 560px; height: 560px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(221,0,49,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes breathe {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity:.6; }
    50%      { transform: translate(-50%,-50%) scale(1.18); opacity:1; }
  }

  .mark {
    margin-bottom: 2rem;
    animation: fadeUp 0.7s ease both;
  }
  .mark svg {
    width: 60px; height: 60px;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { filter: drop-shadow(0 0 12px rgba(221,0,49,0.35)); }
    50%      { filter: drop-shadow(0 0 28px rgba(221,0,49,0.65)); }
  }

  .center {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5rem 1.5rem 6rem;
    max-width: 620px;
    width: 100%;
  }

  .handle {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.4rem;
    animation: fadeUp 0.6s 0.08s ease both;
    opacity: 0;
  }

  /* "i'm" label */
  .im {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2.5vw, 1.3rem);
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
    animation: fadeUp 0.6s 0.13s ease both;
    opacity: 0;
  }

  .big-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 7vw, 4.2rem);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 0.3rem;
    animation: fadeUp 0.6s 0.18s ease both;
    opacity: 0;
    color: var(--text);
  }

  .big-name-last {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 4.5vw, 2.6rem);
    font-weight: 400;
    font-style: italic;
    color: var(--red);
    letter-spacing: -0.02em;
    margin-bottom: 1.8rem;
    animation: fadeUp 0.6s 0.22s ease both;
    opacity: 0;
  }

  /* chaicode badge */
  .chai-badge {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.4rem;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 0.65rem 1.1rem;
    margin-bottom: 2rem;
    background: var(--card);
    font-size: 0.68rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    animation: fadeUp 0.6s 0.28s ease both;
    opacity: 0;
    line-height: 1.7;
    text-align: center;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .chai-badge:hover { border-color: #f97316; }
  .chai-top {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }
  .chai-name {
    color: #f97316;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .chai-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0.3rem 0;
  }
  .chai-bottom {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  .chai-bottom a {
    color: #9b98b8;
    text-decoration: none;
    transition: color 0.2s;
  }
  .chai-bottom a:hover { color: var(--text); }

  .bio {
    font-size: 0.8rem;
    line-height: 1.9;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin-bottom: 2.8rem;
    animation: fadeUp 0.6s 0.34s ease both;
    opacity: 0;
  }
  .bio strong { color: #9b98b8; font-weight: 400; }

  /* npm chip */
  .package {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1.1rem;
    margin-bottom: 2.8rem;
    background: var(--card);
    font-size: 0.73rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    animation: fadeUp 0.6s 0.40s ease both;
    opacity: 0;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .package:hover {
    border-color: var(--red);
    color: var(--text);
    box-shadow: 0 0 16px rgba(221,0,49,0.12);
  }
  .pkg-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid rgba(221,0,49,0.3);
    border-radius: 4px;
    padding: 0.15rem 0.4rem;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    margin-bottom: 2.8rem;
    animation: fadeUp 0.6s 0.46s ease both;
    opacity: 0;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink {
    0%,100% { opacity:1; box-shadow:0 0 8px var(--red); }
    50%      { opacity:0.2; box-shadow:none; }
  }
  .status-text {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .socials {
    display: flex;
    flex-wrap: wrap;
    gap: 0.9rem;
    justify-content: center;
    animation: fadeUp 0.6s 0.52s ease both;
    opacity: 0;
  }
  .soc {
    width: 44px; height: 44px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    background: var(--card);
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .soc:hover {
    border-color: var(--red);
    transform: translateY(-3px);
    box-shadow: 0 4px 16px rgba(221,0,49,0.15);
  }
  .soc svg { fill: var(--muted); transition: fill 0.2s; }
  .soc:hover svg { fill: var(--text); }

  h4 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1rem, 3.5vw, 2rem);
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-block: 1.8rem;
    color: #3a3852;
    animation: fadeUp 0.6s 0.58s ease both;
    opacity: 0;
  }
  h4 em { font-style: italic; color: var(--red); opacity: 0.7; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .footer {
    position: fixed; bottom: 1.4rem;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: #1e1c2a;
    z-index: 1;
  }
</style>
</head>
